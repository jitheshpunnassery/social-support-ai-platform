version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_support
      POSTGRES_USER: ssuser
      POSTGRES_PASSWORD: sspass
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssuser"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongodata:/data/db"]

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrantdata:/qdrant/storage"]

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollamadata:/root/.ollama"]
    # After first start: docker exec -it <container> ollama pull llama3.1:8b-instruct-q4_K_M
    #                     docker exec -it <container> ollama pull llava:13b

  langfuse:
    image: langfuse/langfuse:2
    depends_on: [postgres]
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://ssuser:sspass@postgres:5432/social_support
      NEXTAUTH_SECRET: change-me
      NEXTAUTH_URL: http://localhost:3000
      SALT: change-me-too

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    depends_on: [postgres, mongo, qdrant, neo4j]
    ports: ["8000:8000"]
    volumes: ["./:/app"]

  frontend:
    build: .
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    depends_on: [api]
    ports: ["8501:8501"]
    volumes: ["./:/app"]

volumes:
  pgdata:
  mongodata:
  qdrantdata:
  neo4jdata:
  ollamadata:
